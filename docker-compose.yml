version: "3.8"

services:

  # ── SQL Server 2022 ────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: industrial_sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "IndustrialAI#2026"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - "IndustrialAI#2026"
        - -Q
        - "SELECT 1"
        - -b
        - -C
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── One-shot schema init (runs once, exits) ────────────────────────────────
  # Waits for sqlserver to pass its healthcheck, then applies db/init.sql.
  # Re-running docker-compose up is safe: every CREATE is guarded.
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: industrial_sqlserver_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./db:/init:ro
    command:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - sqlserver
      - -U
      - sa
      - -P
      - "IndustrialAI#2026"
      - -i
      - /init/init.sql
      - -b
      - -C
    restart: "no"

  # ── Apache Kafka 3.9 (KRaft — no ZooKeeper) ────────────────────────────────
  # Two listeners:
  #   PLAINTEXT_HOST  → localhost:9092   used by the .NET producer running on your Mac
  #   PLAINTEXT_INT   → kafka:29092      used by other containers (Spark, kafka-init)
  kafka:
    image: apache/kafka:3.9.0
    container_name: industrial_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT_INT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT_INT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_INT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD
        - /opt/kafka/bin/kafka-topics.sh
        - --bootstrap-server
        - localhost:9092
        - --list
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── One-shot topic creation ────────────────────────────────────────────────
  # Creates the industrial-telemetry topic once Kafka is healthy.
  # --if-not-exists makes it safe to re-run.
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: industrial_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - kafka:29092
      - --create
      - --if-not-exists
      - --topic
      - industrial-telemetry
      - --partitions
      - "6"
      - --replication-factor
      - "1"
    restart: "no"

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: industrial_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

volumes:
  sqlserver_data:
  kafka_data:
